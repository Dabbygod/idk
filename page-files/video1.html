<!DOCTYPE html>
<html>
<head>
  <title>Boot Menu Prank</title>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      padding: 20px;
    }

    .menu-item {
      padding: 5px 10px;
      width: 300px;
      background: #00ff00;
      color: black;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    #loadingScreen div {
      opacity: 0;
      animation: fadeIn 0.3s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    #media {
      display: none; /* start hidden */
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      justify-content: center;
      align-items: center;
    }

    #media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<h3>BOOT MENU</h3>
<div id="menu">
  <div class="menu-item">▶ Press ENTER to Boot</div>
</div>

<div id="loadingScreen" class="hidden"></div>

<div id="media">
  <video id="video" controls>
    <source src="media/nvg.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<script>
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      startLoading();
    }
  });

  function startLoading() {
    document.getElementById("menu").classList.add("hidden");
    const loading = document.getElementById("loadingScreen");
    loading.classList.remove("hidden");

    const lines = [
      "Booting system...",
      "Loading drivers...",
      "Initializing memory...",
      "Starting media engine...",
      "Launching..."
    ];

    lines.forEach((text, i) => {
      const div = document.createElement("div");
      div.textContent = text;
      div.style.animationDelay = (i * 0.5) + "s";
      loading.appendChild(div);
    });

    setTimeout(() => {
      loading.classList.add("hidden");
      playVideo();
    }, 3000);
  }

  function playVideo() {
    const media = document.getElementById("media");
    media.style.display = "flex";

    const video = document.getElementById("video");

    // jump to the timestamp of the lyrics (in seconds)
    // Example: "Never gonna give you up" starts at 52.0s
    video.currentTime = 52.0;

    // unmute and play
    video.muted = false;
    video.play().catch(err => console.log("Play failed:", err));

    // optional: fullscreen
    if (video.requestFullscreen) {
      video.requestFullscreen();
    }
  }
</script>

</body>
</html>
