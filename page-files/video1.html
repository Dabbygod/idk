<!DOCTYPE html>
<html>
<head>
  <title>Security Check</title>
  <style>
    body {
      margin: 0;
      background: #f9f9f9;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #captcha {
      background: white;
      border: 1px solid #d3d3d3;
      padding: 20px;
      width: 300px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .row {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    #box {
      width: 24px;
      height: 24px;
      border: 2px solid #c1c1c1;
      margin-right: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #checkmark {
      display: none;
      font-size: 18px;
      color: green;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #ccc;
      border-top: 3px solid #4285f4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #status {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
      display: none;
    }

    #videoContainer {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #videoContainer video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<div id="container">
  <div id="captcha">
    <div class="row" id="clickArea">
      <div id="box">
        <div class="spinner" id="spinner"></div>
        <span id="checkmark">✔</span>
      </div>
      <span>I'm not a robot</span>
    </div>
    <div id="status">Verifying...</div>
  </div>
</div>

<div id="videoContainer">
  <video id="video" controls>
    <source src="media/nvg.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<script>
  document.getElementById("clickArea").onclick = function() {
    const check = document.getElementById("checkmark");
    const spinner = document.getElementById("spinner");
    const status = document.getElementById("status");
    const box = document.getElementById("box");

    // Show spinner and status
    spinner.style.display = "block";
    status.style.display = "block";

    // Simulate verification delay
    setTimeout(() => {
      spinner.style.display = "none";
      check.style.display = "block";
      status.textContent = "Verified!";

      // Small delay then show video
      setTimeout(() => {
        const videoContainer = document.getElementById("videoContainer");
        const video = document.getElementById("video");

        videoContainer.style.display = "flex";

        // Jump to exact timestamp (e.g., 52s for "Never gonna give you up")
        video.currentTime = 52.0;

        // Play with sound
        video.muted = false;
        video.play().catch(err => console.log("Autoplay blocked:", err));

        // Optional fullscreen
        if (video.requestFullscreen) {
          video.requestFullscreen();
        }
      }, 800); // small delay for effect
    }, 2000); // simulate 2s verification
  };
</script>

</body>
</html>
