<!DOCTYPE html>
<html>
<head>
  <title>Video Player</title>

  <style>
    body {
      background-color: Honeydew;
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      margin-top: 40px;
    }

    video {
      width: 80%;
      max-width: 900px;
      height: auto;
      border: 2px solid black;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<div class="container">
  <button onclick="playPause()">Play / Pause</button>
  <br>

  <video id="video1">
    <source src="https://dabbygod.github.io/idk/media/67.mp4" type="video/mp4">
    Your browser does not support HTML video.
  </video>
</div>

<script>
  var myVideo = document.getElementById("video1");

  function playPause() {
    if (myVideo.paused) {
      myVideo.play();
    } else {
      myVideo.pause();
    }
  }
</script>

</body>
</html>
