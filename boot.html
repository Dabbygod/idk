<!DOCTYPE html>
<html>
<head>
  <title>Boot Menu</title>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      padding: 20px;
    }

    .menu-item {
      padding: 5px 10px;
      width: 300px;
    }

    .selected {
      background: #00ff00;
      color: black;
    }

    .hidden {
      display: none;
    }

    #loadingScreen div {
      opacity: 0;
      animation: fadeIn 0.3s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    video {
      width: 600px;
      border: 2px solid #00ff00;
    }
  </style>
</head>
<body>

<h3>BOOT MENU</h3>

<div id="menu">
  <div class="menu-item selected">▶ Play Video</div>
  <div class="menu-item">▶ Play Audio</div>
</div>

<div id="loadingScreen" class="hidden"></div>

<div id="media" class="hidden">
  <video id="video" controls>
    <source src="media/nvg.mp4" type="video/mp4">
  </video>

  <audio id="audio">
    <source src="media/nvg.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
  const items = document.querySelectorAll(".menu-item");
  let index = 0;

  document.addEventListener("keydown", (e) => {
    if (document.getElementById("loadingScreen").classList.contains("hidden")) {

      if (e.key === "ArrowDown") {
        items[index].classList.remove("selected");
        index = (index + 1) % items.length;
        items[index].classList.add("selected");
      }

      if (e.key === "ArrowUp") {
        items[index].classList.remove("selected");
        index = (index - 1 + items.length) % items.length;
        items[index].classList.add("selected");
      }

      if (e.key === "Enter") {
        startLoading(index);
      }
    }
  });

  function startLoading(choice) {
    document.getElementById("menu").classList.add("hidden");

    const loading = document.getElementById("loadingScreen");
    loading.classList.remove("hidden");

    const lines = [
      "Booting system...",
      "Loading drivers...",
      "Initializing memory...",
      "Starting media engine...",
      "Launching..."
    ];

    lines.forEach((text, i) => {
      const div = document.createElement("div");
      div.textContent = text;
      div.style.animationDelay = (i * 0.5) + "s";
      loading.appendChild(div);
    });

    setTimeout(() => {
      loading.classList.add("hidden");
      playMedia(choice);
    }, 3000);
  }

function playMedia(choice) {
  const media = document.getElementById("media");
  media.classList.remove("hidden");

  if (choice === 0) {
    const video = document.getElementById("video");
    video.muted = false; // allow sound
    video.play();
  } else {
    const audio = document.getElementById("audio");
    audio.play();
  }
}
</script>

</body>
</html>
