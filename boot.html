<!DOCTYPE html>
<html>
<head>
  <title>Boot Menu</title>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      padding: 20px;
      text-align: center;
    }

    .menu-item {
      padding: 5px 10px;
      width: 300px;
      background: #00ff00;
      color: black;
      margin: 0 auto 20px auto;
    }

    .hidden {
      display: none;
    }

    #loadingScreen div {
      opacity: 0;
      animation: fadeIn 0.3s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Button style */
    button {
      padding: 10px 20px;
      background: #00ff00;
      color: black;
      border: none;
      font-family: 'Courier New', monospace;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }

    #media {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
    }

    #media.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<h3>BOOT MENU</h3>

<div id="menu">
  <div class="menu-item">▶ Press ENTER or Click Launch </div>

  <!-- NEW BUTTON -->
  <button onclick="startLoading()">Launch</button>
</div>

<div id="loadingScreen" class="hidden"></div>

<div id="media" class="hidden">
  <video id="video" controls>
    <source src="https://dabbygod.github.io/idk/media/nvg.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<script>
  let started = false;

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      startLoading();
    }
  });

  function startLoading() {
    if (started) return; // prevents double trigger
    started = true;

    document.getElementById("menu").classList.add("hidden");

    const loading = document.getElementById("loadingScreen");
    loading.classList.remove("hidden");

    const lines = [
      "Rebooting system...",
      "Reloading drivers...",
      "Initializing memory...",
      "Starting media engine...",
      "Launching..."
    ];

    lines.forEach((text, i) => {
      const div = document.createElement("div");
      div.textContent = text;
      div.style.animationDelay = (i * 0.5) + "s";
      loading.appendChild(div);
    });

    setTimeout(() => {
      loading.classList.add("hidden");
      playVideo();
    }, 3000);
  }

  function playVideo() {
    const media = document.getElementById("media");
    media.classList.remove("hidden");
    media.classList.add("active");

    const video = document.getElementById("video");
    video.muted = false;
    video.play();
  }
</script>

</body>
</html>
