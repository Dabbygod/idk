<!DOCTYPE html>
<html>
<head>
  <title>Verification Required</title>
  <style>
    body {
      margin: 0;
      background: #f9f9f9;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #box {
      background: white;
      border: 1px solid #ccc;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    #checkbox {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      cursor: pointer;
    }
    #video {
      display: none;
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

<div id="box">
  <label>
    <input type="checkbox" id="checkbox">
    I'm not a robot
  </label>
</div>

<iframe id="video" allow="autoplay"></iframe>

<script>
  document.getElementById("checkbox").addEventListener("click", function() {
    const vid = document.getElementById("video");
    vid.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?start=43&autoplay=1";
    
    document.getElementById("box").style.display = "none";
    vid.style.display = "block";
  });
</script>

</body>
</html>
