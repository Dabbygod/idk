<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 30px;
      cursor: pointer;
      color: #333;
      transition: 0.2s;
    }

    h1:hover {
      opacity: 0.7;
    }

    .container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 30px;
    }

    .card {
      width: 180px;
      height: 180px;
      background: #f5f5f5;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 20px;
      color: #333;
      text-decoration: none;

      transition: all 0.25s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      background: #eaeaea;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    /* Hidden button at start */
    #startBtn {
      display: none;
      width: 180px;
      height: 60px;
      border: none;
      border-radius: 15px;
      background: #f5f5f5;
      font-size: 18px;
      cursor: pointer;

      transition: all 0.25s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    #startBtn:hover {
      transform: scale(1.05);
      background: #eaeaea;
    }
  </style>
</head>
<body>

  <!-- Clickable title -->
  <h1 onclick="showButton()">Home</h1>

  <div class="container">
    <a href="page-files/video1.html" class="card">Video</a>
    <a href="page2.html" class="card">Page 2</a>
    <a href="page3.html" class="card">Page 3</a>
  </div>

  <!-- Hidden button -->
  <button id="startBtn" onclick="startBoot()">Start</button>

  <script>
    let started = false;

    function startBoot() {
      if (!started) {
        started = true;
        window.location.href = "boot.html";
      }
    }

    function showButton() {
      document.getElementById("startBtn").style.display = "block";
    }

    // SPACE key support
    document.addEventListener('keydown', function(e) {
      if (e.code === "Space") {
        startBoot();
      }
    });
  </script>

</body>
</html>
