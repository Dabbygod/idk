const win = window.open('about:blank');

win.document.write(`
  <html>
    <head>
      <title>67</title>
    </head>
    <body>
      <script>
        document.addEventListener('keydown', (e) => {
          if (e.key === 'k') {
            window.close();
          }
        });
      <\/script>
    </body>
  </html>
`);

win.document.close();
