<!DOCTYPE html>
<html>
<head>
  <title>Security Check</title>
  <style>
    body {
      margin: 0;
      background: #f9f9f9;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #captcha {
      background: white;
      border: 1px solid #d3d3d3;
      padding: 20px;
      width: 300px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .row {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    #box {
      width: 24px;
      height: 24px;
      border: 2px solid #c1c1c1;
      margin-right: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #checkmark {
      display: none;
      font-size: 18px;
      color: green;
    }

    #status {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
      display: none;
    }

    #video {
      display: none;
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

<div id="captcha">
  <div class="row" id="clickArea">
    <div id="box">
      <span id="checkmark">✔</span>
    </div>
    <span>I'm not a robot</span>
  </div>
  <div id="status">Verifying...</div>
</div>

<iframe id="video" allow="autoplay"></iframe>

<script>
  document.getElementById("clickArea").onclick = function() {
    const check = document.getElementById("checkmark");
    const status = document.getElementById("status");

    check.style.display = "block";
    status.style.display = "block";

    // random delay (feels more real)
    const delay = 1000 + Math.random() * 1500;

    setTimeout(() => {
      const vid = document.getElementById("video");
      vid.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?start=43&autoplay=1";

      document.getElementById("captcha").style.display = "none";
      vid.style.display = "block";
    }, delay);
  };
</script>

</body>
</html>
