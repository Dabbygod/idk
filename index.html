<!DOCTYPE html>
<html>
<head>
  <title>Home</title>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 30px;
      cursor: pointer;
      color: #333;
      transition: 0.2s;
    }

    h1:hover {
      opacity: 0.7;
    }

    .container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 30px;
    }

    .card {
      width: 180px;
      height: 180px;
      background: #f5f5f5;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 20px;
      color: #333;
      text-decoration: none;

      transition: all 0.25s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      background: #eaeaea;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    #startBtn {
      display: none;
      width: 180px;
      height: 60px;
      border: none;
      border-radius: 15px;
      background: #f5f5f5;
      font-size: 18px;
      cursor: pointer;

      transition: all 0.25s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    #startBtn:hover {
      transform: scale(1.05);
      background: #eaeaea;
    }

    /* ========================= */
    /* OVERLAY */
    /* ========================= */

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      flex-direction: column;
    }

    #lockBox {
      text-align: center;
      font-family: monospace;
    }

    #passInput {
      font-size: 20px;
      padding: 10px;
      width: 250px;
      text-align: center;
    }

    #info {
      margin-top: 10px;
      color: #555;
    }

    /* IFRAME MODE */
    #secretFrame {
      display: none;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <h1 onclick="showButton()">Home</h1>

  <div class="container">
    <a href="page-files/video1.html" class="card">Video</a>
    <a href="page-files/67.html" class="card">Tutorial</a>
    <a href="media/part1 6th grade.mp4" class="card">Page 3</a>
  </div>

  <button id="startBtn" onclick="startBoot()">Start</button>

  <!-- OVERLAY -->
  <div id="overlay">
    
    <!-- PASSCODE UI -->
    <div id="lockBox">
      <h2 id="titleText">Enter 4 digits</h2>
      <input type="text" id="passInput" autofocus>
      <p id="info">Digits required: 4</p>
    </div>

    <!-- IFRAME -->
    <iframe id="secretFrame"></iframe>

  </div>

  <script>
    let started = false;

    function startBoot() {
      if (!started) {
        started = true;
        window.location.href = "boot.html";
      }
    }

    function showButton() {
      document.getElementById("startBtn").style.display = "block";
    }

    document.addEventListener('keydown', function(e) {
      if (e.code === "Space") {
        startBoot();
      }
    });

    // =========================
    // SECRET SYSTEM
    // =========================

    const pi = "314159265358979323846264338327950288419716939937510";

    const START_LENGTH = 4;
    let requiredLength = START_LENGTH;

    const overlay = document.getElementById("overlay");
    const input = document.getElementById("passInput");
    const info = document.getElementById("info");
    const title = document.getElementById("titleText");
    const frame = document.getElementById("secretFrame");
    const lockBox = document.getElementById("lockBox");

    // CHANGE THIS TO YOUR SECRET SITE
    const SECRET_URL = "https://phantom.surge.sh";

    // Open overlay
    document.addEventListener("keydown", function(e) {
      if (e.key.toLowerCase() === "b") {
        overlay.style.display = "flex";
        input.value = "";
        input.focus();
      }
    });

    // Check input
    input.addEventListener("input", function() {
      const value = input.value;

      if (pi.startsWith(value)) {
        if (value.length === requiredLength) {
          
          // SUCCESS → SHOW IFRAME
          lockBox.style.display = "none";
          frame.style.display = "block";
          frame.src = SECRET_URL;

          // reset system
          requiredLength = START_LENGTH;
          input.value = "";
          info.textContent = "Digits required: " + START_LENGTH;
          title.textContent = "Enter first " + START_LENGTH + " digits of π";
        }
      } else {
        requiredLength++;
        info.textContent = "Digits required: " + requiredLength;
        title.textContent = "Enter first " + requiredLength + " digits of π";
        input.value = "";
      }
    });
  </script>

</body>
</html>
