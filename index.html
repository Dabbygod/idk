<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      gap: 30px;
    }

    .card {
      width: 180px;
      height: 180px;
      background: #f5f5f5;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 20px;
      color: #333;
      text-decoration: none;

      transition: all 0.25s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      background: #eaeaea;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="page-files/video1.html" class="card">Video</a>
    <a href="page2.html" class="card">Page 2</a>
    <a href="page3.html" class="card">Page 3</a>
  </div>

</body>
</html>
